<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>📋 Task Manager</h1>
    <div class="header-right">
      <div id="task-counter">Total: 0 | Done: 0 | Pending: 0</div>
      <button id="dark-mode-btn">🌙 Dark Mode</button>
      <button id="export-btn">📁 Export JSON</button>
    </div>
  </header>

  <div id="notification" class="notification hidden"></div>

  <main>

    <section class="add-task-section">
      <form id="task-form">
        <input type="text" id="task-input" placeholder="Enter a task..." required />
        <select id="category-select">
          <option value="">Loading categories...</option>
        </select>
        <select id="priority-select">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="filter-section">
      <input type="text" id="search-input" placeholder="Search tasks..." />
      <select id="filter-category">
        <option value="all">All Categories</option>
      </select>
    </section>

    <!-- Simple loading bar shown during fetch -->
    <div id="loading" class="hidden">
      <div class="loading-bar-track">
        <div class="loading-bar-fill"></div>
      </div>
      <span id="loading-text">Loading categories...</span>
    </div>

    <ul id="task-list"></ul>

  </main>

  <script src="script.js"></script>
</body>

</html>
